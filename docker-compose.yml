services:
  postgres:
    image: postgres:16-alpine
    container_name: taskly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: taskly_db_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskly_db_dev"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    container_name: taskly-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_NAME: Taskly API
      APP_VERSION: 1.0.0
      PORT: 5000
      API_PREFIX: /api/v1
      DATABASE_URL: postgresql://neondb_owner:npg_KrXbSCM39GIv@ep-lucky-dream-a1xwqjyx-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      JWT_SECRET: replace_with_a_32_plus_character_secret_value
      JWT_REFRESH_SECRET: replace_with_a_second_32_plus_character_secret
      ACCESS_TOKEN_EXPIRATION: 365d
      REFRESH_TOKEN_EXPIRATION: 7d
      SESSION_SECRET: replace_with_a_32_plus_character_session_secret
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"

  client:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000
    container_name: taskly-client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:5000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
